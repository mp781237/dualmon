name: Update momentum signals

on:
  schedule:
    - cron: "0 13 2 * *"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python usdn_updater.py

      - name: Commit updated signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals.json usdn.xlsx
          git diff --cached --quiet || git commit -m "Update signals $(date -u +%Y-%m-%d)"
          git push
